<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belediye Arıza Takip Paneli</title>
    <style>
        :root { --orange: #ff7e5f; --dark: #2c3e50; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; }
        nav { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; border-top: 5px solid var(--orange); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        textarea { grid-column: span 2; height: 80px; }
        .file-upload { grid-column: span 2; padding: 15px; background: #fff5f2; border: 2px dashed var(--orange); border-radius: 8px; text-align: center; }
        .submit-btn { grid-column: span 2; background: var(--orange); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .fault-list { display: grid; gap: 15px; }
        .fault-item { background: white; padding: 20px; border-radius: 10px; border-left: 6px solid #ccc; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold;">🏢 Belediye Arıza Takip</div>
    <div>
        <span id="userInfo" style="background: #eee; padding: 5px 15px; border-radius: 20px;">Yükleniyor...</span>
        <button onclick="logout()" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold; margin-left:10px;">Çıkış</button>
    </div>
</nav>

<div class="container">
    <div id="personelForm" class="card" style="display: none;">
        <h3>🛠️ Yeni Arıza Bildirimi</h3>
        <form id="faultForm">
            <div class="form-grid">
                <input type="text" id="deviceName" placeholder="Cihaz Adı (Örn: HP Yazıcı)" required>
                <select id="deviceType">
                    <option value="Bilgisayar">Bilgisayar</option>
                    <option value="Yazıcı">Yazıcı</option>
                    <option value="Ağ Cihazı">Ağ Cihazı</option>
                    <option value="Diğer">Diğer</option>
                </select>
                <select id="priority">
                    <option value="DÜŞÜK">Düşük Öncelik</option>
                    <option value="ORTA" selected>Orta Öncelik</option>
                    <option value="YÜKSEK">Yüksek Öncelik</option>
                </select>
                <textarea id="description" placeholder="Arızanın detaylarını açıklayın..." required></textarea>
                
                <div class="file-upload">
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">📸 Cihaz Fotoğrafı Ekle</label>
                    <input type="file" id="faultImage" accept="image/*">
                </div>

                <button type="submit" class="submit-btn">ARIZA KAYDINI GÖNDER</button>
            </div>
        </form>
    </div>

    <h3>📋 Arıza Kayıtlarım</h3>
    <div id="faultList" class="fault-list">Yükleniyor...</div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = 'index.html';
    document.getElementById('userInfo').innerText = `${user.firstName} (${user.role})`;

    if (user.role === 'DEPARTMAN') {
        document.getElementById('personelForm').style.display = 'block';
    }

    // --- FORM GÖNDERME (FOTOĞRAF DESTEKLİ) ---
    document.getElementById('faultForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData();
        formData.append('deviceName', document.getElementById('deviceName').value);
        formData.append('deviceType', document.getElementById('deviceType').value);
        formData.append('description', document.getElementById('description').value);
        formData.append('priority', document.getElementById('priority').value);
        formData.append('userId', user.id);
        
        const fileInput = document.getElementById('faultImage');
        if (fileInput.files[0]) {
            formData.append('faultImage', fileInput.files[0]);
        }

        const res = await fetch('/faults', {
            method: 'POST',
            body: formData // JSON DEĞİL, FormData gönderiyoruz!
        });

        if (res.ok) {
            alert('Arıza kaydı fotoğrafıyla birlikte oluşturuldu!');
            location.reload();
        } else {
            alert('Bir hata oluştu.');
        }
    });

    // --- LİSTELEME ---
    async function loadFaults() {
        const url = user.role === 'ADMIN' ? '/faults' : `/faults/user/${user.id}`;
        const res = await fetch(url);
        const faults = await res.json();
        
        const listDiv = document.getElementById('faultList');
        listDiv.innerHTML = faults.length === 0 ? '<p>Kayıt bulunamadı.</p>' : '';

        faults.forEach(f => {
            const div = document.createElement('div');
            div.className = 'fault-item';
            div.style.borderLeftColor = f.priority === 'YÜKSEK' ? '#e74c3c' : '#f1c40f';
            div.innerHTML = `
                <div style="float:right; font-weight:bold; color:orange;">${f.status}</div>
                <strong>${f.deviceName}</strong> (${f.deviceType})
                <p>${f.description}</p>
                ${f.imageUrl ? `<img src="${f.imageUrl}" style="width:150px; border-radius:8px; display:block; margin-top:10px; border:1px solid #ddd;">` : ''}
                <div style="font-size:0.8rem; color:#666; margin-top:10px;">Öncelik: ${f.priority}</div>
            `;
            listDiv.appendChild(div);
        });
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    loadFaults();
</script>
</body>
</html>
